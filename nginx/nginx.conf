# ==============================================================================
# TrueBuild Integration Platform — Nginx Configuration
# ==============================================================================
# Production-grade reverse proxy with security headers and rate limiting.
# ==============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security: Hide Nginx version
    server_tokens off;

    # Request body size limit (for webhook payloads)
    client_max_body_size 10m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=10r/s;

    # Upstream: FastAPI application
    upstream truebuild_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For development, proxy directly. For production, redirect to HTTPS.
        # Uncomment the next line for production HTTPS redirect:
        # return 301 https://$host$request_uri;

        # Only allow /webhooks/ to pass to the API
        location /webhooks/ {
            proxy_pass http://truebuild_api;
            include /etc/nginx/proxy_params_custom;
        }

        # Block everything else with 404
        location / {
            return 404;
        }
    }

    # ── HTTPS Server (uncomment for production with SSL) ─────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Only allow /webhooks/ to pass to the API
    #     location /webhooks/ {
    #         proxy_pass http://truebuild_api;
    #         include /etc/nginx/proxy_params_custom;
    #     }
    #
    #     # Block everything else with 404
    #     location / {
    #         return 404;
    #     }
    # }
}

